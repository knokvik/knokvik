name: README build

on:
  push:
    branches:
      - main
  schedule:
    # Daily at 4 AM UTC
    - cron: "0 4 * * *"
  # Manual: Actions → README build → Run workflow
  workflow_dispatch:

jobs:
  build:
    name: Update profile stats
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/cache/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: python -m pip install -r cache/requirements.txt

      - name: Check secrets
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: |
          if [ -z "$ACCESS_TOKEN" ]; then
            echo "::error::Missing secret ACCESS_TOKEN. Add it under Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ -z "$USER_NAME" ]; then
            echo "::error::Missing secret USER_NAME. Add it under Settings → Secrets and variables → Actions (value: knokvik)"
            exit 1
          fi
          echo "Secrets present for user: $USER_NAME"

      - name: Update SVG stats
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
          USER_NAME: ${{ secrets.USER_NAME }}
        run: python today.py

      - name: Commit & push
        run: |-
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dark_mode.svg light_mode.svg cache/
          if git diff --staged --quiet; then
            echo "No stats changes to commit"
          else
            git commit -m "chore: update profile stats"
            git push
          fi
